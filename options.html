<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToS Decoder Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { width: 500px; margin: 40px auto; padding: 0 20px; background: #0f0f1a; }
    .options-wrap { padding: 0; }
    h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 13px; margin-bottom: 28px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px;
      font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
    input, textarea {
      width: 100%; padding: 10px 12px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
    }
    input:focus, textarea:focus { outline: none; border-color: #7c3aed; }
    .hint { font-size: 11px; color: #475569; margin-top: 5px; }
    .toast { display: none; padding: 10px; background: #052e16;
      border: 1px solid #166534; color: #86efac; border-radius: 8px;
      text-align: center; margin-top: 14px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="options-wrap">
    <h1>🔍 ToS Decoder Settings</h1>
    <p class="subtitle">Configure your API key and preferences.</p>
    <div class="field">
      <label>OpenAI API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." />
      <p class="hint">Get your key at platform.openai.com/api-keys.
        Stored locally in your browser — never sent anywhere except OpenAI.</p>
    </div>
    <button class="btn-primary" id="btnSave" style="margin-top:0">Save Settings</button>
    <div class="toast" id="toast">✓ Settings saved!</div>
  </div>
  <script src="options.js"></script>
</body>
</html>
